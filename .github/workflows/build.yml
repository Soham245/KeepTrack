name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Force Python 3.11
        run: |
          export PATH="/opt/hostedtoolcache/Python/3.11.15/x64/bin:$PATH"
          python --version
          pip install --upgrade pip
          pip install --upgrade cython buildozer python-for-android

      - name: Clean build cache
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf .gradle

      - name: Build APK
        run: |
          export PATH="/opt/hostedtoolcache/Python/3.11.15/x64/bin:$PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk